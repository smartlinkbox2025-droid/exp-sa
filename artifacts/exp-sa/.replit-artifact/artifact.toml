kind = "web"
previewPath = "/"
title = "Exp-SA حاسبة الاستيراد السعودية"
version = "1.0.0"
id = "artifacts/exp-sa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19561

[services.development]
run = "pnpm --filter @workspace/exp-sa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exp-sa", "run", "build" ]
publicDir = "artifacts/exp-sa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19561"
BASE_PATH = "/"
